version: '3.8'

services:
  # 数据库服务
  db:
    image: sqlite:latest
    container_name: timeline-db
    volumes:
      - timeline-data:/data
      - ./data:/app/data
    environment:
      - SQLITE_DATABASE=/data/timeline.db
    restart: unless-stopped
    networks:
      - timeline-network
    healthcheck:
      test: ["CMD", "test", "-f", "/data/timeline.db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: timeline-backend
    volumes:
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
      - ./logs:/app/logs
    env_file:
      - .env.production
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/timeline.db
    restart: unless-stopped
    networks:
      - timeline-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.production
    container_name: timeline-frontend
    restart: unless-stopped
    networks:
      - timeline-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx代理服务
  nginx:
    image: nginx:alpine
    container_name: timeline-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static/uploads:/var/www/static/uploads:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - timeline-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  timeline-network:
    driver: bridge

volumes:
  timeline-data:
    driver: local