version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: timeline-backend
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/timeline.db
    restart: unless-stopped
    networks:
      - timeline-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: timeline-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - timeline-network

networks:
  timeline-network:
    driver: bridge

volumes:
  timeline-data: