version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: timeline-backend-dev
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./static/uploads:/app/static/uploads
      - ./backend:/app  # 开发环境代码热重载
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=sqlite:///data/timeline.db
      - SECRET_KEY=dev-secret-key
      - UPLOAD_FOLDER=/app/static/uploads
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174,http://localhost:3000
      - LOG_LEVEL=DEBUG
    restart: unless-stopped
    networks:
      - timeline-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: timeline-frontend-dev
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - timeline-network

networks:
  timeline-network:
    driver: bridge